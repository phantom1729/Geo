<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Geofence Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0041ff; --primary-dark: #0033cc;
            --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --dark: #1a1a1a;
            --white: #ffffff; --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .app-container { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; }
        .header {
            background: rgba(255,255,255,0.95); padding: 1rem;
            box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000;
        }
        .header h1 { color: var(--primary); font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; }
        .status-bar { display: flex; justify-content: space-around; font-size: 0.85rem; }
        .status-item { display: flex; flex-direction: column; align-items: center; }
        .main-content { padding: 1rem; padding-bottom: 6rem; }
        .map-container { height: 350px; border-radius: 16px; overflow: hidden; margin-bottom: 1rem; box-shadow: var(--shadow); background: #e0e7ff; }
        #map { height: 100%; width: 100%; }
        .card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
        .nav-tabs { display: flex; background: white; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
        .nav-tab { flex: 1; padding: 0.8rem; border: none; font-weight: 600; cursor: pointer; background: #eee; }
        .nav-tab.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sos-button {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--danger); color: white; border: none; width: 70px; height: 70px;
            border-radius: 50%; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 2000;
        }
        .btn { background: var(--primary); color: white; border: none; padding: 0.8rem; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; margin-top: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; }
        .modal-content { background: white; padding: 2rem; border-radius: 15px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; }
        .form-group { margin-bottom: 1rem; }
        input, select { width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🛡️ Safety Tracker</h1>
            <div class="status-bar">
                <div class="status-item"><span id="status-tracking">⏹️ Stopped</span><small>GPS</small></div>
                <div class="status-item"><span id="status-mode">🏠 Home</span><small>Mode</small></div>
                <div class="status-item"><span id="timer-display">--:--</span><small>Timer</small></div>
            </div>
        </header>

        <main class="main-content">
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
                <button class="nav-tab" data-tab="geofences">Geofences</button>
                <button class="nav-tab" data-tab="settings">Settings</button>
            </div>

            <div id="dashboard" class="tab-content active">
                <div class="map-container"><div id="map"></div></div>
                <div class="card">
                    <h3>📍 Current Status</h3>
                    <div id="current-status">
                        <button class="btn" onclick="tracker.startTracking()">Start Tracking</button>
                    </div>
                </div>
            </div>

            <div id="geofences" class="tab-content">
                <div class="card">
                    <h3>➕ Add Geofence</h3>
                    <div class="form-group"><input type="text" id="geofence-name" placeholder="Name (e.g. Home)"></div>
                    <div class="form-group"><label>Radius (meters)</label><input type="number" id="geofence-radius" value="50"></div>
                    <p id="geofence-coords" style="font-size:0.8rem; color:#666">Tap on map to set point</p>
                    <button class="btn" onclick="tracker.saveGeofence()">Save Location</button>
                </div>
                <div id="geofence-list" class="card"></div>
            </div>

            <div id="settings" class="tab-content">
                <div class="card">
                    <h3>⚙️ Telegram Alerts</h3>
                    <input type="password" id="telegram-token" placeholder="Bot Token">
                    <input type="text" id="telegram-chatid" placeholder="Chat ID">
                    <button class="btn" onclick="tracker.saveSettings()">Save Settings</button>
                </div>
            </div>
        </main>

        <button class="sos-button" onclick="triggerSOS()">SOS</button>

        <div id="confirm-modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title">Confirm</h2>
                <p id="modal-message"></p>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn" style="background:var(--danger)" onclick="confirmAction()">Confirm</button>
                    <button class="btn" style="background:#888" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        class SafetyTracker {
            constructor() {
                this.map = null; this.userMarker = null; this.watchId = null;
                this.isTracking = false; this.currentPosition = null;
                this.selectedLatLng = null; this.geofences = [];
                this.settings = { telegramToken: '', telegramChatId: '' };
                this.init();
            }

            init() {
                this.loadData();
                this.map = L.map('map').setView([28.6139, 77.2090], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
                this.map.on('click', (e) => {
                    this.selectedLatLng = e.latlng;
                    document.getElementById('geofence-coords').innerText = `Set: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                });
                this.renderGeofenceList();
            }

            startTracking() {
                if (this.watchId) return;
                this.isTracking = true;
                document.getElementById('status-tracking').innerText = "🔄 Live";
                this.watchId = navigator.geolocation.watchPosition(
                    (pos) => this.updateLocation(pos),
                    (err) => console.error(err),
                    { enableHighAccuracy: true }
                );
                this.updateUI();
            }

            updateLocation(pos) {
                const { latitude, longitude } = pos.coords;
                this.currentPosition = { lat: latitude, lng: longitude };
                if (!this.userMarker) {
                    this.userMarker = L.circleMarker([latitude, longitude], { color: 'blue', radius: 8 }).addTo(this.map);
                } else {
                    this.userMarker.setLatLng([latitude, longitude]);
                }
                this.map.panTo([latitude, longitude]);
                this.checkGeofences();
            }

            checkGeofences() {
                let status = "Unknown";
                this.geofences.forEach(g => {
                    const dist = this.map.distance([this.currentPosition.lat, this.currentPosition.lng], [g.lat, g.lng]);
                    if (dist <= g.radius) status = g.name;
                });
                document.getElementById('status-mode').innerText = status;
            }

            saveGeofence() {
                const name = document.getElementById('geofence-name').value;
                if (!name || !this.selectedLatLng) return alert("Select location and name");
                this.geofences.push({ name, lat: this.selectedLatLng.lat, lng: this.selectedLatLng.lng, radius: document.getElementById('geofence-radius').value });
                this.saveData();
                this.renderGeofenceList();
                alert("Geofence Added!");
            }

            renderGeofenceList() {
                const list = document.getElementById('geofence-list');
                list.innerHTML = "<h3>Saved Locations</h3>";
                this.geofences.forEach(g => {
                    list.innerHTML += `<p>📍 ${g.name} (${g.radius}m)</p>`;
                });
            }

            async sendSOS(reason) {
                if (!this.settings.telegramToken) return alert("Setup Telegram first!");
                const url = `https://api.telegram.org/bot${this.settings.telegramToken}/sendMessage`;
                const text = `🚨 SOS ALERT!\nReason: ${reason}\nLocation: https://www.google.com/maps?q=${this.currentPosition.lat},${this.currentPosition.lng}`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: this.settings.telegramChatId, text })
                });
            }

            saveSettings() {
                this.settings.telegramToken = document.getElementById('telegram-token').value;
                this.settings.telegramChatId = document.getElementById('telegram-chatid').value;
                this.saveData();
                alert("Settings Saved!");
            }

            saveData() { localStorage.setItem('safety_data', JSON.stringify({ g: this.geofences, s: this.settings })); }
            loadData() {
                const data = JSON.parse(localStorage.getItem('safety_data'));
                if (data) { this.geofences = data.g || []; this.settings = data.s || {}; }
            }

            updateUI() {
                document.getElementById('current-status').innerHTML = `<p>Tracking is Active ✅</p><button class="btn" style="background:#888" onclick="location.reload()">Stop Tracking</button>`;
            }
        }

        const tracker = new SafetyTracker();

        // UI Tabs Logic
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab, .tab-content').forEach(el => el.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
                tracker.map.invalidateSize();
            });
        });

        function triggerSOS() {
            document.getElementById('modal-message').innerText = "Send emergency alert to your contacts?";
            document.getElementById('confirm-modal').style.display = 'block';
            window.confirmCallback = () => tracker.sendSOS("Manual SOS");
        }

        function confirmAction() { if(window.confirmCallback) window.confirmCallback(); closeModal(); }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    </script>
</body>
</html>
