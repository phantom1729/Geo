    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0041ff; --primary-dark: #0033cc;
            --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --dark: #1a1a1a;
            --light: #f8f9fa; --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; overflow-x: hidden; }
        .app-container { max-width: 100%; margin: 0 auto; min-height: 100vh; position: relative; }
        
        /* Header */
        .header { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 1rem; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .header h1 { color: var(--primary); font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
        .status-bar { display: flex; justify-content: space-around; font-size: 0.85rem; color: var(--dark); }
        .status-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
        .status-battery { display: flex; align-items: center; gap: 0.25rem; }
        .battery-fill { width: 30px; height: 12px; background: #ddd; border-radius: 2px; overflow: hidden; position: relative; }
        .battery-fill::after { content: ''; position: absolute; right: -3px; top: 2px; width: 2px; height: 8px; background: #333; }
        .battery-level { height: 100%; background: linear-gradient(90deg, var(--success), var(--warning), var(--danger)); transition: width 0.3s ease; }
        
        /* Main Content */
        .main-content { padding: 1rem; padding-bottom: 4rem; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* SOS Button */
        .sos-container { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 2000; }
        .sos-button { background: var(--danger); color: white; border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 1.2rem; font-weight: 700; box-shadow: 0 8px 30px rgba(220,53,69,0.4); cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 8px 30px rgba(220,53,69,0.4); } 50% { box-shadow: 0 12px 40px rgba(220,53,69,0.6); } 100% { box-shadow: 0 8px 30px rgba(220,53,69,0.4); } }
        .sos-button:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(220,53,69,0.3); }
        
        /* Map Container */
        .map-container { height: 400px; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 1rem; background: #e0e7ff; position: relative; }
        #map { height: 100%; width: 100%; border-radius: 16px; z-index: 1; }
        
        /* Cards */
        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.2); }
        .card h3 { color: var(--primary); margin-bottom: 1rem; font-size: 1.2rem; }
        
        /* Geofence List */
        .geofence-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .geofence-item { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 1rem; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .geofence-item:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,65,255,0.3); }
        .geofence-item.active { box-shadow: 0 0 20px rgba(0,65,255,0.6); animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 20px rgba(0,65,255,0.6); } to { box-shadow: 0 0 30px rgba(0,65,255,0.8); } }
        
        /* Settings Form */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1rem; transition: border-color 0.3s ease; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,65,255,0.1); }
        .btn { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; width: 100%; margin-bottom: 0.5rem; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: var(--warning); color: var(--dark); }
        
        /* Navigation */
        .nav-tabs { display: flex; background: rgba(255,255,255,0.9); border-radius: 12px; overflow: hidden; margin-bottom: 1rem; box-shadow: var(--shadow); position: relative; z-index: 10; }
        .nav-tab { flex: 1; padding: 1rem; background: transparent; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .nav-tab.active { background: var(--primary); color: white; }
        
        /* Modal & Loading */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(10px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 2rem; border-radius: 20px; max-width: 90%; max-height: 90%; overflow-y: auto; text-align: center; }
        .close-modal { position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; cursor: pointer; color: #999; }
        .loading { display: none; text-align: center; padding: 2rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { .status-bar { font-size: 0.75rem; } .map-container { height: 300px; } .header h1 { font-size: 1.3rem; } }
        @media (max-width: 480px) { .sos-container { bottom: 0.5rem; } .sos-button { width: 70px; height: 70px; font-size: 1rem; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🛡️ Rakshak Elite</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span id="status-tracking">⏹️ Stopped</span>
                    <small>Location</small>
                </div>
                <div class="status-item">
                    <div class="status-battery">
                        <span id="battery-level">--%</span>
                        <div class="battery-fill">
                            <div class="battery-level" style="width: 0%"></div>
                        </div>
                    </div>
                    <small>Battery</small>
                </div>
                <div class="status-item">
                    <span id="status-mode">❓ Unknown Area</span>
                    <small>Mode</small>
                </div>
                <div class="status-item">
                    <span id="timer-display" style="font-weight:bold;">--:--</span>
                    <small>Timer</small>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
                <button class="nav-tab" data-tab="geofences">Geofences</button>
                <button class="nav-tab" data-tab="settings">Settings</button>
            </div>

            <div id="dashboard" class="tab-content active">
                <div class="map-container">
                    <div id="map"></div>
                </div>
                <div class="card">
                    <h3>📍 Trip Status</h3>
                    <div id="current-status" style="text-align: center;">
                        <p>Initializing Rakshak Systems...</p>
                    </div>
                </div>
            </div>

            <div id="geofences" class="tab-content">
                <div class="card">
                    <h3>➕ Add Safe Zone</h3>
                    <div class="form-group">
                        <label>Name (e.g., Home, Office, Coaching)</label>
                        <input type="text" id="geofence-name" placeholder="Home, Office, etc.">
                    </div>
                    <div class="form-group">
                        <label>Tap on map to set location & drag to adjust</label>
                        <p id="geofence-coords" style="color: var(--primary-dark); font-weight: bold;">No location selected</p>
                    </div>
                    <div class="form-group">
                        <label>Radius (meters)</label>
                        <input type="number" id="geofence-radius" value="50" min="5" max="500">
                    </div>
                    <button class="btn" onclick="saveGeofence()">Save Geofence</button>
                </div>
                <div class="card">
                    <h3>📍 Saved Zones</h3>
                    <div id="geofence-list" class="geofence-list"></div>
                </div>
            </div>

            <div id="settings" class="tab-content">
                <div class="card">
                    <h3>⚙️ Telegram Settings</h3>
                    <div class="form-group">
                        <label>Bot Token</label>
                        <input type="password" id="telegram-token" placeholder="123456:ABC-DEF...">
                    </div>
                    <div class="form-group">
                        <label>Chat ID</label>
                        <input type="text" id="telegram-chatid" placeholder="123456789">
                    </div>
                    <button class="btn" onclick="testTelegram()">Test Telegram</button>
                </div>
                <div class="card">
                    <h3>⏱️ Default Timer Settings</h3>
                    <div class="form-group">
                        <label>Expected Travel Time (minutes)</label>
                        <select id="travel-timer">
                            <option value="5">5 minutes</option>
                            <option value="10" selected>10 minutes</option>
                            <option value="15">15 minutes</option>
                            <option value="20">20 minutes</option>
                            <option value="30">30 minutes</option>
                        </select>
                    </div>
                    <button class="btn btn-success" onclick="saveSettings()">Save Settings</button>
                </div>
            </div>
        </main>

        <div class="sos-container">
            <button class="sos-button" onclick="triggerSOS()" title="Emergency SOS">SOS</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p id="loading-text">Initializing...</p>
        </div>

        <div id="confirm-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal()">×</span>
                <h2 id="modal-title">Confirm Action</h2>
                <p id="modal-message"></p>
                <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;">
                    <button class="btn btn-danger" id="modal-confirm" onclick="confirmAction()" style="width:auto;">Confirm</button>
                    <button class="btn" onclick="closeModal()" style="width:auto; background:#6c757d;">Cancel</button>
                </div>
            </div>
        </div>

        <div id="status-message" style="position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 1rem; background: rgba(0,0,0,0.8); color: white; border-radius: 12px; display: none; z-index: 2500; text-align: center; max-width: 90%;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        class SafetyGeofenceTracker {
            constructor() {
                this.map = null;
                this.userMarker = null;
                this.selectionMarker = null;
                this.geofenceMarkers = [];
                this.geofenceCircles = [];
                this.watchId = null;
                this.isTracking = false;
                this.currentPosition = null;
                this.selectedGeofenceLocation = null;
                this.geofences = [];
                
                // NEW STATE VARIABLES FOR SMART LOGIC
                this.isArmed = false; // User has pressed "Start My Trip"
                this.timerInterval = null; // Holds the active timer
                
                this.settings = {
                    telegramToken: '',
                    telegramChatId: '',
                    travelTimer: 10 * 60 * 1000 
                };
                
                this.sosInterval = null;
                this.isSOSActive = false;
                this.shakeThreshold = 25;
                this.lastShakeTime = 0;

                this.init();
            }

            async init() {
                this.showLoading('Starting Rakshak...');
                this.loadData();
                await this.initMap();
                this.requestPermissions();
                this.initBatteryMonitor();
                this.initShakeDetection();
                
                // Track GPS continuously in the background to ensure lock
                this.startTracking(); 
                
                this.hideLoading();
            }

            async initMap() {
                // Defaulting to Danapur, Bihar
                const defaultLat = 25.6322;
                const defaultLng = 85.0487;
                this.map = L.map('map', { zoomControl: true, zoom: 15, minZoom: 10, maxZoom: 20 }).setView([defaultLat, defaultLng], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(this.map);
                
                this.map.on('click', (e) => {
                    this.setGeofenceLocation(e.latlng);
                    const geofenceTabBtn = document.querySelector('.nav-tab[data-tab="geofences"]');
                    if (geofenceTabBtn && !geofenceTabBtn.classList.contains('active')) geofenceTabBtn.click();
                });
                
                this.loadGeofencesOnMap();
                this.getCurrentLocation();
            }

            requestPermissions() {
                if (navigator.permissions) {
                    navigator.permissions.query({name: 'geolocation'}).then(p => {
                        if (p.state === 'denied') this.showStatus('Location permission denied.', 'warning');
                    });
                }
                if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
            }

            initBatteryMonitor() {
                if ('getBattery' in navigator) {
                    navigator.getBattery().then(battery => {
                        this.updateBattery(battery.level * 100);
                        battery.addEventListener('levelchange', () => this.updateBattery(battery.level * 100));
                    });
                }
            }

            updateBattery(level) {
                document.getElementById('battery-level').textContent = Math.round(level) + '%';
                document.querySelector('.battery-level').style.width = level + '%';
            }

            initShakeDetection() {
                if (window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', (e) => {
                        const acc = e.accelerationIncludingGravity;
                        if (!acc) return;
                        const speed = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
                        const now = Date.now();
                        if (speed > this.shakeThreshold && now - this.lastShakeTime > 1000) {
                            this.lastShakeTime = now;
                            this.showConfirm('Shake detected!', 'Trigger SOS?', () => this.triggerSOS('Shake detection'));
                        }
                    });
                }
            }

            startTracking() {
                if (this.watchId) return;
                this.isTracking = true;
                document.getElementById('status-tracking').textContent = '🔄 Online';
                this.watchId = navigator.geolocation.watchPosition(
                    (pos) => this.onLocationUpdate(pos),
                    (err) => this.onLocationError(err),
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 10000 }
                );
                this.updateUI();
            }

            onLocationUpdate(position) {
                this.currentPosition = { lat: position.coords.latitude, lng: position.coords.longitude, accuracy: position.coords.accuracy };
                if (this.userMarker) {
                    this.userMarker.setLatLng([this.currentPosition.lat, this.currentPosition.lng]);
                } else {
                    this.userMarker = L.marker([this.currentPosition.lat, this.currentPosition.lng], {
                        icon: L.divIcon({ className: 'user-location', html: '👤', iconSize: [30, 30], iconAnchor: [15, 15] })
                    }).addTo(this.map);
                }
                this.map.panTo([this.currentPosition.lat, this.currentPosition.lng], { animate: true });
                
                // Run the safety checking logic
                this.checkGeofences();
            }

            onLocationError(error) {
                this.showStatus('Location error: ' + error.message, 'error');
            }

            getCurrentLocation() {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        this.currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        this.map.setView([this.currentPosition.lat, this.currentPosition.lng], 15);
                    },
                    () => console.warn("Could not retrieve initial location."),
                    { enableHighAccuracy: true }
                );
            }

            setGeofenceLocation(latlng) {
                this.selectedGeofenceLocation = latlng;
                document.getElementById('geofence-coords').textContent = `Lat: ${latlng.lat.toFixed(6)}, Lng: ${latlng.lng.toFixed(6)}`;
                if (!this.selectionMarker) {
                    this.selectionMarker = L.marker(latlng, { draggable: true }).addTo(this.map).bindPopup("Drag me to adjust").openPopup();
                    this.selectionMarker.on('dragend', (e) => {
                        const newPos = e.target.getLatLng();
                        this.selectedGeofenceLocation = newPos;
                        document.getElementById('geofence-coords').textContent = `Lat: ${newPos.lat.toFixed(6)}, Lng: ${newPos.lng.toFixed(6)}`;
                    });
                } else {
                    this.selectionMarker.setLatLng(latlng);
                    this.selectionMarker.openPopup();
                }
            }

            saveGeofence() {
                const name = document.getElementById('geofence-name').value.trim();
                const radius = parseInt(document.getElementById('geofence-radius').value);
                if (!name || !this.selectedGeofenceLocation) {
                    this.showStatus('Please enter a name and tap the map.', 'warning');
                    return;
                }
                const geofence = { id: Date.now().toString(), name, lat: this.selectedGeofenceLocation.lat, lng: this.selectedGeofenceLocation.lng, radius: radius || 50 };
                this.geofences.push(geofence);
                this.saveData();
                this.loadGeofencesOnMap();
                this.renderGeofenceList();
                if (this.selectionMarker) { this.map.removeLayer(this.selectionMarker); this.selectionMarker = null; }
                document.getElementById('geofence-name').value = '';
                document.getElementById('geofence-coords').textContent = 'No location selected';
                this.selectedGeofenceLocation = null; 
                this.showStatus(`Geofence "${name}" saved!`, 'success');
            }

            loadGeofencesOnMap() {
                this.geofenceMarkers.forEach(m => this.map.removeLayer(m));
                this.geofenceCircles.forEach(c => this.map.removeLayer(c));
                this.geofenceMarkers = []; this.geofenceCircles = [];
                this.geofences.forEach(g => {
                    const marker = L.marker([g.lat, g.lng], { title: g.name }).addTo(this.map);
                    marker.bindPopup(`<b>${g.name}</b><br>Radius: ${g.radius}m`);
                    this.geofenceMarkers.push(marker);
                    const circle = L.circle([g.lat, g.lng], { radius: g.radius, color: '#0041ff', fillColor: '#0041ff', fillOpacity: 0.2, weight: 2 }).addTo(this.map);
                    this.geofenceCircles.push(circle);
                });
            }

            renderGeofenceList() {
                const container = document.getElementById('geofence-list');
                container.innerHTML = '';
                this.geofences.forEach(g => {
                    const div = document.createElement('div');
                    div.className = 'geofence-item';
                    div.innerHTML = `<div style="font-size: 0.85rem; font-weight: 600;">${g.name}</div><div style="font-size: 0.7rem; opacity: 0.9;">${g.radius}m Radius</div>`;
                    div.onclick = () => {
                        this.map.setView([g.lat, g.lng], 16);
                        document.querySelectorAll('.geofence-item').forEach(el => el.classList.remove('active'));
                        div.classList.add('active');
                    };
                    container.appendChild(div);
                });
            }

            getDistance(lat1, lon1, lat2, lon2) {
                const R = 6371000; 
                const φ1 = lat1 * Math.PI/180; const φ2 = lat2 * Math.PI/180;
                const Δφ = (lat2-lat1) * Math.PI/180; const Δλ = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            }

            // ==========================================
            // SMART LOGIC: No more Ghost Starts!
            // ==========================================
            
            // Called from HTML Button
            manualStart() {
                this.isArmed = true;
                this.showStatus('System Armed. Waiting to leave safe zone...', 'success');
                this.updateUI();
                this.checkGeofences(); // Force check immediately
            }

            // User Cancels trip manually
            cancelTrip() {
                this.isArmed = false;
                this.stopTravelTimer();
                document.getElementById('timer-display').textContent = "--:--";
                document.getElementById('timer-display').style.color = "var(--dark)";
                this.showStatus('Trip Cancelled', 'info');
                this.updateUI();
            }

            checkGeofences() {
                if (!this.currentPosition || this.geofences.length === 0) return;

                let insideAnyZone = false;
                let currentZoneName = "Transit (Unknown)";

                // Find out if we are inside any saved zone right now
                for (const g of this.geofences) {
                    const dist = this.getDistance(this.currentPosition.lat, this.currentPosition.lng, g.lat, g.lng);
                    if (dist <= g.radius) {
                        insideAnyZone = true;
                        currentZoneName = g.name;
                        break; 
                    }
                }

                // CASE 1: System is ARMED, and user steps OUTSIDE a safe zone -> START TRIP TIMER
                if (this.isArmed && !insideAnyZone && !this.timerInterval) {
                    this.startTravelTimer();
                    this.sendTelegramMessage(`🚀 *Trip Started*\nLeft safe zone. Expected arrival in ${this.settings.travelTimer / 60000} mins.`);
                    this.showStatus('Trip Started! Timer Active', 'warning');
                }

                // CASE 2: Timer is running (Trip Active), and user ENTERS a safe zone -> END TRIP
                if (this.timerInterval && insideAnyZone) {
                    this.isArmed = false; // Disarm the system
                    this.stopTravelTimer();
                    document.getElementById('timer-display').textContent = "00:00 ✅";
                    document.getElementById('timer-display').style.color = "var(--success)";
                    this.sendTelegramMessage(`✅ *Reached Safely*\nArrived at: ${currentZoneName}. Tracking paused.`);
                    this.showStatus(`Arrived safely at ${currentZoneName}!`, 'success');
                }

                document.getElementById('status-mode').textContent = `📍 ${currentZoneName}`;
                this.updateUI(); // Keep UI in sync
            }

            startTravelTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                const timeLeft = this.settings.travelTimer;
                let elapsed = 0;

                this.timerInterval = setInterval(() => {
                    elapsed += 1000;
                    const remaining = Math.max(0, timeLeft - elapsed);
                    const mins = Math.floor(remaining / 60000);
                    const secs = Math.floor((remaining % 60000) / 1000);

                    document.getElementById('timer-display').textContent = `${mins}:${secs.toString().padStart(2, '0')} ⏰`;
                    document.getElementById('timer-display').style.color = '#ffc107';

                    if (remaining === 0) {
                        this.stopTravelTimer();
                        this.triggerSOS('Timer Expired: Did not reach destination in time!');
                    }
                }, 1000);
                this.updateUI();
            }

            stopTravelTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
                this.updateUI();
            }

            // Update UI based on Current State
            updateUI() {
                const statusDiv = document.getElementById('current-status');
                
                if (!this.isArmed && !this.timerInterval) {
                    // IDLE STATE
                    statusDiv.innerHTML = `
                        <button class="btn btn-success" onclick="tracker.manualStart()" style="font-size:1.1rem; padding:1rem;">🚀 Start My Trip</button>
                        <p style="font-size: 0.85rem; margin-top: 10px; opacity: 0.8;">Tap before leaving a safe zone to arm Rakshak.</p>
                    `;
                } else if (this.isArmed && !this.timerInterval) {
                    // ARMED, WAITING TO LEAVE
                    statusDiv.innerHTML = `
                        <span style="color:var(--primary); font-weight:bold; font-size:1.1rem;">🛡️ Armed: Waiting to leave safe zone...</span>
                        <br><br>
                        <button class="btn btn-warning" onclick="tracker.cancelTrip()">Cancel Trip</button>
                    `;
                } else if (this.timerInterval) {
                    // IN TRANSIT (TIMER RUNNING)
                    statusDiv.innerHTML = `
                        <div style="background: rgba(255,193,7,0.2); padding: 1rem; border-radius: 12px; border: 1px solid var(--warning);">
                            <span style="color:var(--warning); font-weight:bold; font-size:1.1rem;">🔄 Trip in Progress...</span>
                            <div style="font-size: 0.9rem; margin-top:10px;">
                                <strong>Live GPS:</strong><br>
                                Lat: ${this.currentPosition ? this.currentPosition.lat.toFixed(5) : 'Wait'}, Lng: ${this.currentPosition ? this.currentPosition.lng.toFixed(5) : 'Wait'}
                            </div>
                        </div>
                        <br>
                        <button class="btn btn-danger" onclick="tracker.cancelTrip()">Force Stop Trip</button>
                    `;
                }
            }

            async sendTelegramMessage(msgText) {
                if (!this.settings.telegramToken || !this.settings.telegramChatId) return;
                try {
                    await fetch(`https://api.telegram.org/bot${this.settings.telegramToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: this.settings.telegramChatId,
                            text: msgText,
                            parse_mode: "Markdown",
                            disable_web_page_preview: false
                        })
                    });
                } catch (error) {
                    console.error('Telegram send failed:', error);
                }
            }

            async triggerSOS(reason = 'Manual Request') {
                if (this.isSOSActive) return;
                this.isSOSActive = true;
                this.showStatus(`🚨 SOS Triggered: ${reason}`, 'danger');

                await this.sendSOSAlert(reason);
                
                this.sosInterval = setInterval(async () => {
                    await this.sendSOSAlert('Live tracking update');
                }, 15000); 

                if (Notification.permission === 'granted') {
                    new Notification('🚨 EMERGENCY SOS ACTIVE', { body: `SOS triggered: ${reason}` });
                }
            }

            async sendSOSAlert(reason) {
                const lat = this.currentPosition ? this.currentPosition.lat.toFixed(6) : 'Unknown';
                const lon = this.currentPosition ? this.currentPosition.lng.toFixed(6) : 'Unknown';
                const batteryEl = document.getElementById('battery-level').textContent;
                const timestamp = new Date().toLocaleString();

                let msg = `🚨 *EMERGENCY SOS TRIGGERED* 🚨\n\n*Reason:* ${reason}\n*Time:* ${timestamp}\n*Battery:* ${batteryEl}\n`;
                if (lat !== 'Unknown') {
                    msg += `*Location:* http://googleusercontent.com/maps.google.com/maps?q=${lat},${lon}\n\n_Live tracking activated._`;
                } else {
                    msg += `*Location:* GPS unavailable.`;
                }
                
                await this.sendTelegramMessage(msg);
            }

            stopSOS() {
                if (this.sosInterval) { clearInterval(this.sosInterval); this.sosInterval = null; }
                this.isSOSActive = false;
                this.showStatus('SOS cancelled', 'success');
            }

            testTelegram() {
                const token = document.getElementById('telegram-token').value;
                const chatId = document.getElementById('telegram-chatid').value;
                if (!token || !chatId) { this.showStatus('Enter Token and Chat ID', 'warning'); return; }
                
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: '✅ *Rakshak Elite* Telegram Test Successful!', parse_mode: 'Markdown' })
                }).then(r => r.ok ? this.showStatus('Connection successful!', 'success') : this.showStatus('Test failed.', 'error'));
            }

            saveSettings() {
                this.settings.telegramToken = document.getElementById('telegram-token').value.trim();
                this.settings.telegramChatId = document.getElementById('telegram-chatid').value.trim();
                this.settings.travelTimer = parseInt(document.getElementById('travel-timer').value) * 60 * 1000;
                this.saveData();
                this.showStatus('Settings saved securely', 'success');
            }

            saveData() {
                localStorage.setItem('safety_geofences', JSON.stringify(this.geofences));
                localStorage.setItem('safety_settings', JSON.stringify(this.settings));
            }

            loadData() {
                const savedGeofences = localStorage.getItem('safety_geofences');
                if (savedGeofences) this.geofences = JSON.parse(savedGeofences);
                
                const savedSettings = localStorage.getItem('safety_settings');
                if (savedSettings) {
                    this.settings = { ...this.settings, ...JSON.parse(savedSettings) };
                } else {
                    // Fix for default timer issue: Ensure it pulls exactly what is in the dropdown if no save exists
                    this.settings.travelTimer = parseInt(document.getElementById('travel-timer').value) * 60 * 1000;
                }

                document.getElementById('telegram-token').value = this.settings.telegramToken || '';
                document.getElementById('telegram-chatid').value = this.settings.telegramChatId || '';
                document.getElementById('travel-timer').value = (this.settings.travelTimer / 60000).toString();
                this.renderGeofenceList();
            }

            showLoading(text) { document.getElementById('loading-text').textContent = text; document.getElementById('loading').style.display = 'block'; }
            hideLoading() { document.getElementById('loading').style.display = 'none'; }
            showStatus(message, type = 'info') {
                const el = document.getElementById('status-message');
                el.textContent = message;
                el.style.background = type === 'success' ? 'var(--success)' : type === 'danger' ? 'var(--danger)' : type === 'warning' ? 'var(--warning)' : 'var(--primary)';
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 4000);
            }
            showConfirm(title, message, callback) {
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-message').textContent = message;
                document.getElementById('confirm-modal').style.display = 'block';
                window.confirmCallback = callback;
            }
        }

        let tracker;
        function initApp() { tracker = new SafetyGeofenceTracker(); }
        function saveGeofence() { tracker.saveGeofence(); }
        function testTelegram() { tracker.testTelegram(); }
        function saveSettings() { tracker.saveSettings(); }
        
        function triggerSOS(reason = 'Manual Request') {
            if (tracker.isSOSActive) {
                tracker.showConfirm('Cancel SOS?', 'Stop the emergency broadcast?', () => tracker.stopSOS());
            } else {
                tracker.showConfirm('🚨 EMERGENCY SOS', 'Send live location to Telegram immediately?', () => tracker.triggerSOS(reason));
            }
        }

        function confirmAction() { if (window.confirmCallback) window.confirmCallback(); closeModal(); }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.nav-tab');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(target).classList.add('active');
                    if (target === 'geofences') tracker.renderGeofenceList();
                    if ((target === 'dashboard' || target === 'geofences') && tracker && tracker.map) {
                        setTimeout(() => tracker.map.invalidateSize(), 100); 
                    }
                });
            });
            initApp();
        });
    </script>
</body>
</html>
